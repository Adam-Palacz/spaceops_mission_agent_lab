# stage overlay — integration / GPU canary / checkpoint proof (ADR 0005).

global:
  namespace: spaceops-stage

secrets:
  create: false
  name: spaceops-stage-secrets
  existingSecret: spaceops-stage-secrets

postgres:
  auth:
    existingSecret: spaceops-stage-secrets
  persistence:
    size: 10Gi

api:
  replicas: 2
  llm:
    backend: openai
  checkpoint:
    enabled: true

observability:
  otelCollector:
    enabled: true
  jaeger:
    enabled: true

nats:
  enabled: true

telemetryPersister:
  enabled: true

externalSecrets:
  remoteRefs:
    postgresPassword: spaceops-stage/postgres-password
    openaiApiKey: spaceops-stage/openai-api-key
    approvalApiKey: spaceops-stage/approval-api-key
    githubToken: spaceops-stage/github-token
    ngcApiKey: spaceops-stage/ngc-api-key

isolation:
  enabled: true
  environment: stage
  workloadServiceAccounts: true
  networkPolicy:
    enabled: true
    allowLlmEgress: true
  resourceQuota:
    enabled: true
    hard:
      pods: "40"
      requests.cpu: "8"
      requests.memory: 16Gi
      limits.cpu: "16"
      limits.memory: 32Gi
  limitRange:
    enabled: true
