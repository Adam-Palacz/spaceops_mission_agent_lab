{{- if .Values.observability.postgresExporter.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "spaceops.fullname" . }}-postgres-exporter
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-exporter
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: {{ .Values.observability.postgresExporter.port }}
      targetPort: metrics
  selector:
    {{- include "spaceops.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-exporter
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spaceops.fullname" . }}-postgres-exporter
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "spaceops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres-exporter
  template:
    metadata:
      labels:
        {{- include "spaceops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres-exporter
    spec:
      serviceAccountName: {{ include "spaceops.componentServiceAccountName" (dict "root" . "component" "postgres-exporter") }}
      containers:
        - name: postgres-exporter
          image: {{ .Values.observability.postgresExporter.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: {{ .Values.observability.postgresExporter.port }}
          env:
            - name: DATA_SOURCE_URI
              value: "{{ include "spaceops.postgresHost" . }}:{{ .Values.postgres.port }}/{{ .Values.postgres.auth.database }}?sslmode=disable"
            - name: DATA_SOURCE_USER
              value: {{ .Values.postgres.auth.username | quote }}
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "spaceops.secretName" . }}
                  key: {{ .Values.postgres.auth.secretKeys.password }}
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.observability.postgresExporter.resources | nindent 12 }}
{{- end }}
{{- if .Values.observability.prometheus.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "spaceops.fullname" . }}-prometheus-config
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.observability.prometheus.scrapeInterval }}
    rule_files:
      - /etc/prometheus/rules/*.yml
    scrape_configs:
      - job_name: spaceops-api
        metrics_path: /metrics
        static_configs:
          - targets:
              - {{ include "spaceops.fullname" . }}-api:{{ .Values.api.port }}
      {{- if .Values.nats.enabled }}
      - job_name: spaceops-nats
        metrics_path: /varz
        static_configs:
          - targets:
              - {{ include "spaceops.fullname" . }}-nats:{{ .Values.nats.monitoringPort }}
      {{- end }}
      {{- if .Values.observability.postgresExporter.enabled }}
      - job_name: spaceops-postgres
        metrics_path: /metrics
        static_configs:
          - targets:
              - {{ include "spaceops.fullname" . }}-postgres-exporter:{{ .Values.observability.postgresExporter.port }}
      {{- end }}
      {{- if .Values.observability.otelCollector.enabled }}
      - job_name: spaceops-otel-collector
        metrics_path: /metrics
        static_configs:
          - targets:
              - {{ include "spaceops.fullname" . }}-otel-collector:8888
      {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "spaceops.fullname" . }}-prometheus-rules
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  spaceops-slo-rules.yml: |
    groups:
      - name: spaceops.slo.rules
        rules:
          - alert: SpaceOpsApiDown
            expr: up{job="spaceops-api"} == 0
            for: 5m
            labels:
              severity: page
              route: platform
            annotations:
              summary: "SpaceOps API scrape target is down"
              runbook: "docs/slo-production-readiness.md#alert-routing"
          - alert: SpaceOpsSlowRunP95
            expr: histogram_quantile(0.95, sum by (le)(rate(agent_run_duration_seconds_bucket[15m]))) > 60
            for: 15m
            labels:
              severity: ticket
              route: mission-agent
            annotations:
              summary: "Agent run p95 latency exceeds 60s"
              runbook: "docs/slo-production-readiness.md#slo-catalog"
          - alert: SpaceOpsHighRunErrorRate
            expr: sum(rate(agent_runs_total{status="error"}[15m])) / clamp_min(sum(rate(agent_runs_total[15m])), 1) > 0.05
            for: 15m
            labels:
              severity: page
              route: mission-agent
            annotations:
              summary: "Agent run error rate exceeds 5%"
              runbook: "docs/slo-production-readiness.md#slo-catalog"
          - alert: SpaceOpsHighEscalationRate
            expr: sum(rate(agent_escalations_total[15m])) / clamp_min(sum(rate(agent_behavior_runs_total[15m])), 1) > 0.40
            for: 15m
            labels:
              severity: ticket
              route: mission-agent
            annotations:
              summary: "Escalation rate exceeds 40%"
              runbook: "docs/slo-production-readiness.md#slo-catalog"
          - alert: SpaceOpsEvidencePolicyViolations
            expr: sum(rate(agent_evidence_coverage_total{policy_status="violation"}[15m])) > 0
            for: 5m
            labels:
              severity: page
              route: safety
            annotations:
              summary: "Evidence policy violations detected"
              runbook: "docs/slo-production-readiness.md#slo-catalog"
          - alert: SpaceOpsOpaToolFailures
            expr: sum(rate(agent_tool_outcome_total{tool="opa_check",outcome="failure"}[15m])) > 0
            for: 5m
            labels:
              severity: page
              route: safety
            annotations:
              summary: "OPA tool failures detected"
              runbook: "docs/slo-production-readiness.md#alert-routing"
          - alert: SpaceOpsLlmBudgetExceeded
            expr: increase(agent_escalations_total{reason="budget_exceeded"}[15m]) > 0
            for: 0m
            labels:
              severity: ticket
              route: cost
            annotations:
              summary: "LLM budget exhaustion caused escalation"
              runbook: "docs/slo-production-readiness.md#slo-catalog"
          - alert: SpaceOpsNatsScrapeDown
            expr: up{job="spaceops-nats"} == 0
            for: 5m
            labels:
              severity: page
              route: platform
            annotations:
              summary: "NATS monitoring scrape target is down"
              runbook: "docs/slo-production-readiness.md#alert-routing"
          - alert: SpaceOpsPostgresExporterDown
            expr: up{job="spaceops-postgres"} == 0
            for: 5m
            labels:
              severity: page
              route: data-plane
            annotations:
              summary: "Postgres exporter scrape target is down"
              runbook: "docs/slo-production-readiness.md#alert-routing"
          - alert: SpaceOpsSyntheticPr12Probe
            expr: vector(0)
            for: 0m
            labels:
              severity: ticket
              route: synthetic
            annotations:
              summary: "Synthetic PR1.2 alert rule; temporarily change expr to vector(1) during alert drills"
              runbook: "docs/slo-production-readiness.md#synthetic-alert-trigger"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "spaceops.fullname" . }}-prometheus
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.observability.prometheus.port }}
      targetPort: http
  selector:
    {{- include "spaceops.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spaceops.fullname" . }}-prometheus
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "spaceops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: prometheus
  template:
    metadata:
      labels:
        {{- include "spaceops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: prometheus
    spec:
      serviceAccountName: {{ include "spaceops.componentServiceAccountName" (dict "root" . "component" "prometheus") }}
      containers:
        - name: prometheus
          image: {{ .Values.observability.prometheus.image }}
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time={{ .Values.observability.prometheus.retention }}
          ports:
            - name: http
              containerPort: {{ .Values.observability.prometheus.port }}
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.observability.prometheus.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: rules
              mountPath: /etc/prometheus/rules
      volumes:
        - name: config
          configMap:
            name: {{ include "spaceops.fullname" . }}-prometheus-config
        - name: rules
          configMap:
            name: {{ include "spaceops.fullname" . }}-prometheus-rules
{{- end }}
{{- if .Values.observability.grafana.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "spaceops.fullname" . }}-grafana-provisioning
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "spaceops.fullname" . }}-prometheus:{{ .Values.observability.prometheus.port }}
        isDefault: true
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: spaceops
        orgId: 1
        folder: SpaceOps
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/provisioning/dashboards
  spaceops-overview.json: |
    {
      "title": "SpaceOps Production Readiness SLO",
      "schemaVersion": 39,
      "version": 1,
      "panels": [
        {
          "type": "stat",
          "title": "Agent runs",
          "targets": [{"expr": "sum(agent_runs_total)"}],
          "gridPos": {"x": 0, "y": 0, "w": 8, "h": 4}
        },
        {
          "type": "stat",
          "title": "API availability",
          "targets": [{"expr": "avg_over_time(up{job=\"spaceops-api\"}[15m])"}],
          "gridPos": {"x": 0, "y": 4, "w": 8, "h": 4}
        },
        {
          "type": "stat",
          "title": "Run error rate",
          "targets": [{"expr": "sum(rate(agent_runs_total{status=\"error\"}[15m])) / clamp_min(sum(rate(agent_runs_total[15m])), 1)"}],
          "gridPos": {"x": 8, "y": 4, "w": 8, "h": 4}
        },
        {
          "type": "stat",
          "title": "Escalation rate",
          "targets": [{"expr": "sum(rate(agent_escalations_total[15m])) / clamp_min(sum(rate(agent_behavior_runs_total[15m])), 1)"}],
          "gridPos": {"x": 16, "y": 4, "w": 8, "h": 4}
        },
        {
          "type": "timeseries",
          "title": "Evidence violations",
          "targets": [{"expr": "sum(rate(agent_evidence_coverage_total{policy_status=\"violation\"}[15m]))"}],
          "gridPos": {"x": 0, "y": 8, "w": 8, "h": 4}
        },
        {
          "type": "timeseries",
          "title": "OPA failures",
          "targets": [{"expr": "sum(rate(agent_tool_outcome_total{tool=\"opa_check\",outcome=\"failure\"}[15m]))"}],
          "gridPos": {"x": 8, "y": 8, "w": 8, "h": 4}
        },
        {
          "type": "timeseries",
          "title": "Budget exceeded escalations",
          "targets": [{"expr": "increase(agent_escalations_total{reason=\"budget_exceeded\"}[15m])"}],
          "gridPos": {"x": 16, "y": 8, "w": 8, "h": 4}
        },
        {
          "type": "timeseries",
          "title": "API p95 run latency",
          "targets": [{"expr": "histogram_quantile(0.95, sum by (le)(rate(agent_run_duration_seconds_bucket[15m])))"}],
          "gridPos": {"x": 8, "y": 0, "w": 8, "h": 4}
        },
        {
          "type": "stat",
          "title": "DLQ rows observed",
          "targets": [{"expr": "sum(agent_errors_total)"}],
          "gridPos": {"x": 16, "y": 0, "w": 8, "h": 4}
        }
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "spaceops.fullname" . }}-grafana
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.observability.grafana.port }}
      targetPort: http
  selector:
    {{- include "spaceops.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spaceops.fullname" . }}-grafana
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "spaceops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "spaceops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      serviceAccountName: {{ include "spaceops.componentServiceAccountName" (dict "root" . "component" "grafana") }}
      containers:
        - name: grafana
          image: {{ .Values.observability.grafana.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.observability.grafana.port }}
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.observability.grafana.admin.user | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "observability.grafana.admin.existingSecret is required when grafana is enabled" .Values.observability.grafana.admin.existingSecret }}
                  key: {{ .Values.observability.grafana.admin.passwordKey }}
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.observability.grafana.resources | nindent 12 }}
          volumeMounts:
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources/datasources.yml
              subPath: datasources.yml
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: dashboards.yml
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/spaceops-overview.json
              subPath: spaceops-overview.json
      volumes:
        - name: provisioning
          configMap:
            name: {{ include "spaceops.fullname" . }}-grafana-provisioning
{{- end }}
