# dev overlay — local kind/k3d and engineer namespaces (ADR 0005).

global:
  namespace: spaceops-dev

images:
  api:
    tag: local
  mcp:
    tag: local

api:
  llm:
    backend: openai
  replicas: 1

secrets:
  create: true
  name: spaceops-dev-secrets
  # Supply at install only: --set secrets.postgresPassword=$K8S_POSTGRES_PASSWORD
  # Optional: --set secrets.openaiApiKey=$OPENAI_API_KEY (never commit real values)
  postgresPassword: ""
  openaiApiKey: ""

postgres:
  persistence:
    size: 2Gi

isolation:
  enabled: true
  environment: dev
  workloadServiceAccounts: true
  networkPolicy:
    enabled: true
    allowLlmEgress: true
  resourceQuota:
    enabled: true
    hard:
      pods: "30"
      requests.cpu: "6"
      requests.memory: 12Gi
      limits.cpu: "12"
      limits.memory: 24Gi
  limitRange:
    enabled: true
