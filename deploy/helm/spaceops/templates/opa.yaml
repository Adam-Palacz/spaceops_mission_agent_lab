{{- if .Values.opa.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "spaceops.fullname" . }}-opa
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
    app.kubernetes.io/component: opa
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.opa.port }}
      targetPort: http
  selector:
    {{- include "spaceops.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: opa
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spaceops.fullname" . }}-opa
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
    app.kubernetes.io/component: opa
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "spaceops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: opa
  template:
    metadata:
      labels:
        {{- include "spaceops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: opa
    spec:
      containers:
        - name: opa
          image: {{ .Values.opa.image }}
          imagePullPolicy: IfNotPresent
          args:
            - run
            - --server
            - --addr=0.0.0.0:8181
            - /policies
          ports:
            - name: http
              containerPort: {{ .Values.opa.port }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.opa.resources | nindent 12 }}
          volumeMounts:
            - name: policies
              mountPath: /policies
      volumes:
        - name: policies
          configMap:
            name: {{ include "spaceops.fullname" . }}-opa-policy
{{- end }}
