# S1.13 — CI: lint (ruff, mypy), pytest tests/, evals.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: python -m mypy -m apps.agent -m apps.api -m config -m evals --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: spaceops
          POSTGRES_PASSWORD: spaceops
          POSTGRES_DB: spaceops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spaceops -d spaceops"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Migration smoke (upgrade/downgrade/upgrade)
        env:
          DATABASE_URL: postgresql://spaceops:spaceops@localhost:5432/spaceops
        run: |
          python -m alembic upgrade head
          python -m alembic downgrade base
          python -m alembic upgrade head

      - name: Pytest
        run: pytest tests/ -v
        env:
          POSTGRES_PASSWORD: spaceops
          DATABASE_URL: postgresql://spaceops:spaceops@localhost:5432/spaceops

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare runtime .env for Compose (CI only)
        run: |
          cp .env.example .env
          # Minimal non-secret defaults required by docker-compose interpolation/env_file.
          # This file is ephemeral on the runner and is NOT committed.
          {
            echo "POSTGRES_PASSWORD=ci-docker-build"
            echo "APPROVAL_API_KEY="
            echo "NATS_URL="
            echo "OPENAI_API_KEY="
          } >> .env

      - name: Validate Compose configuration
        run: docker compose -f infra/docker-compose.yml --project-directory . config >/dev/null

      - name: Build application images (API, UI, MCP)
        run: |
          docker compose -f infra/docker-compose.yml --project-directory . --profile ui build \
            api ui telemetry-mcp kb-mcp ticket-mcp gitops-mcp

      - name: Cleanup runtime .env
        if: always()
        run: rm -f .env

  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run evals (with Telemetry MCP server)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          # Start Telemetry MCP server in background (reads from data/telemetry fixtures)
          python -m apps.mcp.telemetry_server.main &
          MCP_PID=$!
          # Give the server a moment to start
          sleep 5
          # Deterministic must-escalate gate (PS1.8)
          python -m evals.scoring --case-id must-escalate-no-evidence
          # Deterministic evidence-required gate (PS1.8)
          python -m evals.scoring --case-id citation-present
          # Run evals; this will call Telemetry MCP over HTTP (http://localhost:8001/mcp)
          python -m evals.scoring
          # Stop MCP server (best-effort)
          kill $MCP_PID || true
