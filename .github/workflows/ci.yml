# S1.13 / PS4.7 — CI: lint, safety gates, pytest, golden, evals (hard + soft), gate summary.
# PS5.7: default CI is GPU-free; NIM/GPU smoke runs only via workflow_dispatch gpu-smoke workflow.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: python -m mypy -m apps.agent -m apps.api -m config -m evals --ignore-missing-imports

  golden-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Golden baseline gate (PS4.5 / PS4.7 hard)
        run: pytest tests/test_golden_baseline.py tests/test_golden_runner_ps45.py -v

  safety-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: OPA fail-closed + HITL/guardrails (PS4.7 hard)
        run: >
          pytest
          tests/test_act_opa_policy.py
          tests/test_opa_client.py
          tests/test_evidence_policy_ps41.py
          tests/test_prompt_injection_ps43.py
          tests/test_guardrails_ps17.py
          tests/test_output_schema_ps42.py
          tests/test_behavior_metrics_ps46.py
          tests/test_ci_gating_ps47.py
          -v

  semantic-evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Semantic eval suite (PS4.4, no LLM)
        run: python -m evals.semantic --write-summary eval-semantic-summary.json

      - name: Upload semantic eval summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-semantic-summary
          path: eval-semantic-summary.json

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: spaceops
          POSTGRES_PASSWORD: spaceops
          POSTGRES_DB: spaceops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spaceops -d spaceops"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Migration smoke (upgrade/downgrade/upgrade)
        env:
          DATABASE_URL: postgresql://spaceops:spaceops@localhost:5432/spaceops
        run: |
          python -m alembic upgrade head
          python -m alembic downgrade base
          python -m alembic upgrade head

      - name: Pytest
        run: pytest tests/ -v
        env:
          POSTGRES_PASSWORD: spaceops
          DATABASE_URL: postgresql://spaceops:spaceops@localhost:5432/spaceops

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Prepare runtime .env for Compose (CI only)
        run: |
          cp .env.example .env
          {
            echo "POSTGRES_PASSWORD=ci-docker-build"
            echo "APPROVAL_API_KEY="
            echo "NATS_URL="
            echo "OPENAI_API_KEY="
          } >> .env

      - name: Validate Compose configuration
        run: docker compose -f infra/docker-compose.yml --project-directory . config >/dev/null

      - name: Build application images (API, UI, MCP)
        run: |
          docker compose -f infra/docker-compose.yml --project-directory . --profile ui build \
            api ui telemetry-mcp kb-mcp ticket-mcp gitops-mcp

      - name: Cleanup runtime .env
        if: always()
        run: rm -f .env

  evals-hard:
    runs-on: ubuntu-latest
    outputs:
      live_eval_status: ${{ steps.live-eval-status.outputs.status }}
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
        if: ${{ env.OPENAI_API_KEY != '' }}

      - name: Skip hard eval gates when OPENAI_API_KEY is unset
        if: ${{ env.OPENAI_API_KEY == '' }}
        run: echo "OPENAI_API_KEY is unset; hard live eval gates are skipped."

      - name: Set up Python
        if: ${{ env.OPENAI_API_KEY != '' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Hard eval gates (PS1.8 + injection / PS4.7)
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          docker run -d --rm --name ci-opa -p 8181:8181 \
            -v "$PWD/infra/opa:/policies:ro" \
            openpolicyagent/opa:1.14.0 \
            run --server --addr=0.0.0.0:8181 /policies
          python -m apps.mcp.telemetry_server.main &
          MCP_PID=$!
          cleanup() {
            kill $MCP_PID || true
            docker stop ci-opa || true
          }
          trap cleanup EXIT
          sleep 5
          echo "=== HARD GATE: must-escalate-no-evidence ==="
          python -m evals.scoring --case-id must-escalate-no-evidence
          echo "=== HARD GATE: citation-present ==="
          python -m evals.scoring --case-id citation-present
          echo "=== HARD GATE: injection suite ==="
          python -m evals.scoring --injection-only

      - name: Report hard eval status
        id: live-eval-status
        if: always()
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
          else
            echo "status=success" >> "$GITHUB_OUTPUT"
          fi

  evals-soft:
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      live_eval_status: ${{ steps.live-eval-status.outputs.status }}
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
        if: ${{ env.OPENAI_API_KEY != '' }}

      - name: Skip soft eval signal when OPENAI_API_KEY is unset
        if: ${{ env.OPENAI_API_KEY == '' }}
        run: echo "OPENAI_API_KEY is unset; soft live eval signal is skipped."

      - name: Set up Python
        if: ${{ env.OPENAI_API_KEY != '' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Soft eval signal — full suite (PS4.7, non-blocking)
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          docker run -d --rm --name ci-opa-soft -p 8181:8181 \
            -v "$PWD/infra/opa:/policies:ro" \
            openpolicyagent/opa:1.14.0 \
            run --server --addr=0.0.0.0:8181 /policies
          python -m apps.mcp.telemetry_server.main &
          MCP_PID=$!
          cleanup() {
            kill $MCP_PID || true
            docker stop ci-opa-soft || true
          }
          trap cleanup EXIT
          sleep 5
          python -m evals.scoring --soft-signal || true
          echo "SOFT_SIGNAL job finished (see log for quality drift)."

      - name: Report soft eval status
        id: live-eval-status
        if: always()
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
          else
            echo "status=success" >> "$GITHUB_OUTPUT"
          fi

  gate-summary:
    runs-on: ubuntu-latest
    needs:
      - lint
      - golden-check
      - safety-gates
      - semantic-evals
      - test
      - docker-build
      - evals-hard
      - evals-soft
    if: always()
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Gate policy summary (PS4.7)
        env:
          NEEDS_LINT_RESULT: ${{ needs.lint.result }}
          NEEDS_GOLDEN_CHECK_RESULT: ${{ needs.golden-check.result }}
          NEEDS_SAFETY_GATES_RESULT: ${{ needs.safety-gates.result }}
          NEEDS_SEMANTIC_EVALS_RESULT: ${{ needs.semantic-evals.result }}
          NEEDS_TEST_RESULT: ${{ needs.test.result }}
          NEEDS_DOCKER_BUILD_RESULT: ${{ needs.docker-build.result }}
          NEEDS_EVALS_HARD_RESULT: ${{ needs.evals-hard.result == 'success' && needs.evals-hard.outputs.live_eval_status || needs.evals-hard.result }}
          NEEDS_EVALS_SOFT_RESULT: ${{ needs.evals-soft.result == 'success' && needs.evals-soft.outputs.live_eval_status || needs.evals-soft.result }}
        run: python scripts/ci_gate_summary.py

      - name: Upload gate summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-gate-summary
          path: ci-gate-summary.md
