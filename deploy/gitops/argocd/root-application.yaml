# App-of-apps: syncs child Application manifests from Git.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spaceops-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: spaceops
  source:
    repoURL: __GITOPS_REPO_URL__
    targetRevision: __GITOPS_TARGET_REVISION__
    path: deploy/gitops/argocd/applications
    helm:
      parameters:
        - name: repoUrl
          value: __GITOPS_REPO_URL__
        - name: targetRevision
          value: __GITOPS_TARGET_REVISION__
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
