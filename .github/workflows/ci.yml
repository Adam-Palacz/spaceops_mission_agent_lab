# S1.13 — CI: lint (ruff, mypy), pytest tests/, evals.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: python -m mypy -m apps.agent -m apps.api -m config -m evals --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pytest
        run: pytest tests/ -v
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run evals (with Telemetry MCP server)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          # Start Telemetry MCP server in background (reads from data/telemetry fixtures)
          python -m apps.mcp.telemetry_server.main &
          MCP_PID=$!
          # Give the server a moment to start
          sleep 5
          # Run evals; this will call Telemetry MCP over HTTP (http://localhost:8001/mcp)
          python -m evals.scoring
          # Stop MCP server (best-effort)
          kill $MCP_PID || true
