{{- if and .Values.isolation.enabled .Values.isolation.limitRange.enabled }}
apiVersion: v1
kind: LimitRange
metadata:
  name: {{ include "spaceops.fullname" . }}-limits
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
spec:
  limits:
    - type: Container
      {{- with .Values.isolation.limitRange.default }}
      default:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.isolation.limitRange.defaultRequest }}
      defaultRequest:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.isolation.limitRange.max }}
      max:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
