# PS6.10 — Portfolio docs link check (no cluster required).
name: Portfolio docs lint

on:
  push:
    branches: [main]
    paths:
      - "docs/portfolio/**"
      - "docs/runbooks/**"
      - "docs/threat_model.md"
      - "docs/adr/README.md"
      - "tests/test_portfolio_ps610.py"
      - ".github/workflows/portfolio-docs-lint.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/portfolio/**"
      - "docs/runbooks/**"
      - "docs/threat_model.md"
      - "docs/adr/README.md"
      - "tests/test_portfolio_ps610.py"
      - ".github/workflows/portfolio-docs-lint.yml"

jobs:
  portfolio-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install pytest

      - run: pytest tests/test_portfolio_ps610.py -v
