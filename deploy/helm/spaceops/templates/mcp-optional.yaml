{{- if .Values.gitopsMcp.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "spaceops.fullname" . }}-gitops-mcp
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
    app.kubernetes.io/component: gitops-mcp
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.gitopsMcp.port }}
      targetPort: http
  selector:
    {{- include "spaceops.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gitops-mcp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spaceops.fullname" . }}-gitops-mcp
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
    app.kubernetes.io/component: gitops-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "spaceops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gitops-mcp
  template:
    metadata:
      labels:
        {{- include "spaceops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gitops-mcp
    spec:
      serviceAccountName: {{ include "spaceops.componentServiceAccountName" (dict "root" . "component" "gitops-mcp") }}
      containers:
        - name: gitops-mcp
          image: {{ include "spaceops.image" (dict "repository" .Values.images.mcp.repository "tag" .Values.images.mcp.tag) }}
          imagePullPolicy: {{ .Values.images.mcp.pullPolicy }}
          command: ["python", "-m", "apps.mcp.gitops_server.main"]
          ports:
            - name: http
              containerPort: {{ .Values.gitopsMcp.port }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          env:
            - name: GITHUB_REPO
              value: {{ .Values.gitopsMcp.githubRepo | quote }}
            {{- include "spaceops.secretEnvOptional" (list . "GITHUB_TOKEN" "GITHUB_TOKEN") | nindent 12 }}
          volumeMounts:
            - name: ops-config
              mountPath: /app/ops-config
      volumes:
        {{- if .Values.api.persistence.opsConfig.configMapName }}
        - name: ops-config
          configMap:
            name: {{ .Values.api.persistence.opsConfig.configMapName }}
        {{- else }}
        - name: ops-config
          emptyDir: {}
        {{- end }}
{{- end }}
