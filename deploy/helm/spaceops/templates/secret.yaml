{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "spaceops.secretName" . }}
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.postgres.auth.secretKeys.password }}: {{ required "secrets.postgresPassword is required when secrets.create=true (use --set or K8S_POSTGRES_PASSWORD)" .Values.secrets.postgresPassword | quote }}
  {{- if .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.approvalApiKey }}
  APPROVAL_API_KEY: {{ .Values.secrets.approvalApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.githubToken }}
  GITHUB_TOKEN: {{ .Values.secrets.githubToken | quote }}
  {{- end }}
  {{- if .Values.secrets.ngcApiKey }}
  NGC_API_KEY: {{ .Values.secrets.ngcApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.cursorShApiKey }}
  CURSOR_SH_API_KEY: {{ .Values.secrets.cursorShApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.gpuLlmApiKey }}
  GPU_LLM_API_KEY: {{ .Values.secrets.gpuLlmApiKey | quote }}
  {{- end }}
{{- end }}
