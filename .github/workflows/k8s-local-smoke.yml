# PS6.3 — optional local kind smoke (manual / self-hosted; not a PR hard gate).
name: K8s local smoke

on:
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install pytest pyyaml pydantic==2.13.3 pydantic-settings==2.14.0 python-dotenv==1.2.2

      - name: PS6.3 unit checks
        run: pytest tests/test_k8s_ps63.py -v

  kind-smoke:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.4

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: k8s-up smoke
        run: |
          pip install -r requirements.txt
          make k8s-up
        env:
          K8S_POSTGRES_PASSWORD: ci-spaceops

      - name: k8s-down cleanup
        if: always()
        run: make k8s-down
