{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "spaceops.fullname" . }}-secrets
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore.name }}
    kind: {{ .Values.externalSecrets.secretStore.kind }}
  target:
    name: {{ include "spaceops.secretName" . }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.postgres.auth.secretKeys.password }}
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.postgresPassword | quote }}
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.openaiApiKey | quote }}
    - secretKey: APPROVAL_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.approvalApiKey | quote }}
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.githubToken | quote }}
    - secretKey: NGC_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.ngcApiKey | quote }}
{{- end }}
