# SpaceOps Mission Agent Lab — local stack
# Postgres+pgvector, OTel Collector, Jaeger. Single-command run (goals.md §4.5).
#
# Run from repo root so that .env and volume paths resolve correctly:
#   docker compose -f infra/docker-compose.yml --project-directory . up -d
#
# Without --project-directory ., Compose uses infra/ as project dir: .env is not found
# and infra/otel-collector.yaml becomes infra/infra/otel-collector.yaml (missing),
# so Docker mounts an empty directory and OTel fails with "is a directory".
# If you saw that error, run: docker compose -f infra/docker-compose.yml --project-directory . down
# then again: ... --project-directory . up -d

services:
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: spaceops-api
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      opa:
        condition: service_started
    profiles:
      - ui

  postgres:
    image: pgvector/pgvector:pg15
    container_name: spaceops-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-spaceops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-spaceops}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spaceops} -d ${POSTGRES_DB:-spaceops}"]
      interval: 5s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: spaceops-otel-collector
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      # ./ = bind mount (path relative to project dir). Use --project-directory . from repo root.
      - ./infra/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC (agent/API send here in S1.10)
      - "4318:4318"   # OTLP HTTP
    depends_on:
      jaeger:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: spaceops-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Query UI (http://localhost:16686)
    # OTLP 4317/4318 used internally by otel-collector -> jaeger; no host expose needed
    depends_on:
      postgres:
        condition: service_healthy

  opa:
    image: openpolicyagent/opa:1.14.0
    container_name: spaceops-opa
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "/policies"
    working_dir: /policies
    volumes:
      - ./infra/opa:/policies:ro
    ports:
      - "8181:8181"

  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: spaceops-prometheus
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"   # Prometheus UI (http://localhost:9090)
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:12.4.0
    container_name: spaceops-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"   # Grafana UI (http://localhost:3000)
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  ui:
    build:
      context: ./apps/ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${UI_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_APPROVAL_API_KEY: ${APPROVAL_API_KEY}
    container_name: spaceops-ui
    ports:
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_started
    profiles:
      - ui

volumes:
  postgres_data:
