# PS5.3 — Optional NIM smoke (manual / GPU runner only; not a PR merge gate).
name: GPU smoke (NIM)

on:
  workflow_dispatch:

jobs:
  nim-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: GPU smoke note
        run: |
          echo "This workflow is a placeholder for self-hosted GPU runners."
          echo "Configure NGC_API_KEY, NVIDIA runtime, then run:"
          echo "  make gpu-up"
          echo "  python scripts/llm_gpu_smoke.py --wait-health --generate"
          echo "  make gpu-idle-integration"
          echo "See docs/llm_gpu_backend.md"
