{{- if and .Values.isolation.enabled .Values.isolation.workloadServiceAccounts .Values.serviceAccount.create }}
{{- $ns := include "spaceops.namespace" . }}
{{- $labels := include "spaceops.labels" . }}
{{- $root := . }}
{{- $components := list }}
{{- if .Values.api.enabled }}{{- $components = append $components "api" }}{{- end }}
{{- if .Values.postgres.enabled }}{{- $components = append $components "postgres" }}{{- end }}
{{- if .Values.opa.enabled }}{{- $components = append $components "opa" }}{{- end }}
{{- if .Values.nats.enabled }}{{- $components = append $components "nats" }}{{- end }}
{{- if .Values.telemetryMcp.enabled }}{{- $components = append $components "telemetry-mcp" }}{{- end }}
{{- if .Values.telemetryPersister.enabled }}{{- $components = append $components "telemetry-persister" }}{{- end }}
{{- if .Values.kbMcp.enabled }}{{- $components = append $components "kb-mcp" }}{{- end }}
{{- if .Values.ticketMcp.enabled }}{{- $components = append $components "ticket-mcp" }}{{- end }}
{{- if .Values.gitopsMcp.enabled }}{{- $components = append $components "gitops-mcp" }}{{- end }}
{{- if .Values.agentWorker.enabled }}{{- $components = append $components "agent-worker" }}{{- end }}
{{- if .Values.nim.enabled }}{{- $components = append $components "nim" }}{{- end }}
{{- if .Values.observability.otelCollector.enabled }}{{- $components = append $components "otel-collector" }}{{- end }}
{{- if .Values.observability.jaeger.enabled }}{{- $components = append $components "jaeger" }}{{- end }}
{{- if .Values.observability.prometheus.enabled }}{{- $components = append $components "prometheus" }}{{- end }}
{{- if .Values.observability.grafana.enabled }}{{- $components = append $components "grafana" }}{{- end }}
{{- if .Values.observability.postgresExporter.enabled }}{{- $components = append $components "postgres-exporter" }}{{- end }}
{{- range $component := $components }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "spaceops.componentServiceAccountName" (dict "root" $root "component" $component) }}
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
{{- end }}
{{- else if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "spaceops.serviceAccountName" . }}
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
{{- end }}
