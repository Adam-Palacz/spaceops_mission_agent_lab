# Stage - automated sync + self-heal (ADR 0008). Secrets via PS6.6 existingSecret only.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spaceops-stage
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: spaceops
  source:
    repoURL: {{ .Values.repoUrl | quote }}
    targetRevision: {{ .Values.targetRevision | quote }}
    path: deploy/helm/spaceops
    helm:
      releaseName: spaceops
      valueFiles:
        - values.yaml
        - values-stage.yaml
        - values-stage-full.yaml
        - values-ops-config-mounts.yaml
        {{- if .Values.gcp.enabled }}
        - values-gcp-stage.yaml
        {{- end }}
        - values-gitops-stage.yaml
      {{- if .Values.gcp.enabled }}
      parameters:
        - name: images.api.repository
          value: {{ printf "%s-docker.pkg.dev/%s/spaceops/api" .Values.gcp.region .Values.gcp.projectId | quote }}
        - name: images.mcp.repository
          value: {{ printf "%s-docker.pkg.dev/%s/spaceops/mcp" .Values.gcp.region .Values.gcp.projectId | quote }}
        - name: images.api.tag
          value: {{ .Values.gcp.imageTag | quote }}
        - name: images.mcp.tag
          value: {{ .Values.gcp.imageTag | quote }}
        - name: global.createNamespace
          value: "true"
      {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: spaceops-stage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
