{{- if .Values.observability.postgresExporter.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "spaceops.fullname" . }}-postgres-exporter
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-exporter
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: {{ .Values.observability.postgresExporter.port }}
      targetPort: metrics
  selector:
    {{- include "spaceops.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-exporter
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spaceops.fullname" . }}-postgres-exporter
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "spaceops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres-exporter
  template:
    metadata:
      labels:
        {{- include "spaceops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres-exporter
    spec:
      serviceAccountName: {{ include "spaceops.componentServiceAccountName" (dict "root" . "component" "postgres-exporter") }}
      containers:
        - name: postgres-exporter
          image: {{ .Values.observability.postgresExporter.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: {{ .Values.observability.postgresExporter.port }}
          env:
            - name: DATA_SOURCE_URI
              value: "{{ include "spaceops.postgresHost" . }}:{{ .Values.postgres.port }}/{{ .Values.postgres.auth.database }}?sslmode=disable"
            - name: DATA_SOURCE_USER
              value: {{ .Values.postgres.auth.username | quote }}
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "spaceops.secretName" . }}
                  key: {{ .Values.postgres.auth.secretKeys.password }}
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.observability.postgresExporter.resources | nindent 12 }}
{{- end }}
{{- if .Values.observability.prometheus.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "spaceops.fullname" . }}-prometheus-config
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.observability.prometheus.scrapeInterval }}
    scrape_configs:
      - job_name: spaceops-api
        metrics_path: /metrics
        static_configs:
          - targets:
              - {{ include "spaceops.fullname" . }}-api:{{ .Values.api.port }}
      {{- if .Values.nats.enabled }}
      - job_name: spaceops-nats
        metrics_path: /varz
        static_configs:
          - targets:
              - {{ include "spaceops.fullname" . }}-nats:{{ .Values.nats.monitoringPort }}
      {{- end }}
      {{- if .Values.observability.postgresExporter.enabled }}
      - job_name: spaceops-postgres
        metrics_path: /metrics
        static_configs:
          - targets:
              - {{ include "spaceops.fullname" . }}-postgres-exporter:{{ .Values.observability.postgresExporter.port }}
      {{- end }}
      {{- if .Values.observability.otelCollector.enabled }}
      - job_name: spaceops-otel-collector
        metrics_path: /metrics
        static_configs:
          - targets:
              - {{ include "spaceops.fullname" . }}-otel-collector:8888
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "spaceops.fullname" . }}-prometheus
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.observability.prometheus.port }}
      targetPort: http
  selector:
    {{- include "spaceops.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spaceops.fullname" . }}-prometheus
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "spaceops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: prometheus
  template:
    metadata:
      labels:
        {{- include "spaceops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: prometheus
    spec:
      serviceAccountName: {{ include "spaceops.componentServiceAccountName" (dict "root" . "component" "prometheus") }}
      containers:
        - name: prometheus
          image: {{ .Values.observability.prometheus.image }}
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time={{ .Values.observability.prometheus.retention }}
          ports:
            - name: http
              containerPort: {{ .Values.observability.prometheus.port }}
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.observability.prometheus.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
      volumes:
        - name: config
          configMap:
            name: {{ include "spaceops.fullname" . }}-prometheus-config
{{- end }}
{{- if .Values.observability.grafana.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "spaceops.fullname" . }}-grafana-provisioning
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "spaceops.fullname" . }}-prometheus:{{ .Values.observability.prometheus.port }}
        isDefault: true
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: spaceops
        orgId: 1
        folder: SpaceOps
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/provisioning/dashboards
  spaceops-overview.json: |
    {
      "title": "SpaceOps Stage Overview",
      "schemaVersion": 39,
      "version": 1,
      "panels": [
        {
          "type": "stat",
          "title": "Agent runs",
          "targets": [{"expr": "sum(agent_runs_total)"}],
          "gridPos": {"x": 0, "y": 0, "w": 8, "h": 4}
        },
        {
          "type": "timeseries",
          "title": "API p95 run latency",
          "targets": [{"expr": "histogram_quantile(0.95, sum by (le)(rate(agent_run_duration_seconds_bucket[15m])))"}],
          "gridPos": {"x": 8, "y": 0, "w": 8, "h": 4}
        },
        {
          "type": "stat",
          "title": "DLQ rows observed",
          "targets": [{"expr": "sum(agent_errors_total)"}],
          "gridPos": {"x": 16, "y": 0, "w": 8, "h": 4}
        }
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "spaceops.fullname" . }}-grafana
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.observability.grafana.port }}
      targetPort: http
  selector:
    {{- include "spaceops.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spaceops.fullname" . }}-grafana
  namespace: {{ include "spaceops.namespace" . }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "spaceops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "spaceops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      serviceAccountName: {{ include "spaceops.componentServiceAccountName" (dict "root" . "component" "grafana") }}
      containers:
        - name: grafana
          image: {{ .Values.observability.grafana.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.observability.grafana.port }}
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.observability.grafana.admin.user | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "observability.grafana.admin.existingSecret is required when grafana is enabled" .Values.observability.grafana.admin.existingSecret }}
                  key: {{ .Values.observability.grafana.admin.passwordKey }}
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.observability.grafana.resources | nindent 12 }}
          volumeMounts:
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources/datasources.yml
              subPath: datasources.yml
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: dashboards.yml
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/spaceops-overview.json
              subPath: spaceops-overview.json
      volumes:
        - name: provisioning
          configMap:
            name: {{ include "spaceops.fullname" . }}-grafana-provisioning
{{- end }}
