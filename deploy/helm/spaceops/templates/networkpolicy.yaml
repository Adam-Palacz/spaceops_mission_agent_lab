{{- if and .Values.isolation.enabled .Values.isolation.networkPolicy.enabled }}
{{- $fullname := include "spaceops.fullname" . }}
{{- $ns := include "spaceops.namespace" . }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-same-namespace-ingress
  namespace: {{ $ns }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-same-namespace-egress
  namespace: {{ $ns }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-dns-egress
  namespace: {{ $ns }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- if .Values.isolation.networkPolicy.allowLlmEgress }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-api-llm-egress
  namespace: {{ $ns }}
  labels:
    {{- include "spaceops.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "spaceops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
{{- end }}
{{- end }}
