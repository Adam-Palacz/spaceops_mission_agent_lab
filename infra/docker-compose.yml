# SpaceOps Mission Agent Lab — local stack
# Postgres+pgvector, OTel Collector, Jaeger. Single-command run (goals.md §4.5).
#
# Run from repo root so that .env and volume paths resolve correctly:
#   docker compose -f infra/docker-compose.yml --project-directory . up -d
#
# Without --project-directory ., Compose uses infra/ as project dir: .env is not found
# and infra/otel-collector.yaml becomes infra/infra/otel-collector.yaml (missing),
# so Docker mounts an empty directory and OTel fails with "is a directory".
# If you saw that error, run: docker compose -f infra/docker-compose.yml --project-directory . down
# then again: ... --project-directory . up -d

services:
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: spaceops-api
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    environment:
      # Inside containers localhost:4317 is wrong; must reach the collector by service name.
      # Overrides .env meant for host-run (localhost:4317) so traces actually reach Jaeger.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      # PS3.3: API DLQ endpoint queries Postgres; inside Compose use service hostname.
      DATABASE_URL: postgresql://${POSTGRES_USER:-spaceops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-spaceops}
      TELEMETRY_MCP_URL: http://telemetry-mcp:8001/mcp
      KB_MCP_URL: http://kb-mcp:8002/mcp
      TICKET_MCP_URL: http://ticket-mcp:8003/mcp
      GITOPS_MCP_URL: http://gitops-mcp:8004/mcp
      OPA_URL: http://opa:8181/v1/data/agent/allow
      # PS3.2 — JetStream ingest when set (e.g. nats://nats:4222). Empty = NDJSON files only.
      NATS_URL: ${NATS_URL:-}
    volumes:
      - ./data:/app/data
      - ./ops-config:/app/ops-config
    depends_on:
      postgres:
        condition: service_healthy
      opa:
        condition: service_started
      telemetry-mcp:
        condition: service_started
      kb-mcp:
        condition: service_started
      ticket-mcp:
        condition: service_started
      gitops-mcp:
        condition: service_started
      nats:
        condition: service_started
    profiles:
      - ui

  nats:
    image: nats:2.10-alpine
    container_name: spaceops-nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  telemetry-persister:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: spaceops-telemetry-persister
    env_file:
      - ./.env
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgresql://${POSTGRES_USER:-spaceops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-spaceops}
    command: ["python", "-m", "apps.workers.telemetry_persister"]
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg15
    container_name: spaceops-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-spaceops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-spaceops}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spaceops} -d ${POSTGRES_DB:-spaceops}"]
      interval: 5s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: spaceops-otel-collector
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      # ./ = bind mount (path relative to project dir). Use --project-directory . from repo root.
      - ./infra/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC (agent/API send here in S1.10)
      - "4318:4318"   # OTLP HTTP
    depends_on:
      jaeger:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: spaceops-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Query UI (http://localhost:16686)
    # OTLP 4317/4318 used internally by otel-collector -> jaeger; no host expose needed
    depends_on:
      postgres:
        condition: service_healthy

  opa:
    image: openpolicyagent/opa:1.14.0
    container_name: spaceops-opa
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "/policies"
    working_dir: /policies
    volumes:
      - ./infra/opa:/policies:ro
    ports:
      - "8181:8181"

  telemetry-mcp:
    build:
      context: .
      dockerfile: ./apps/mcp/Dockerfile
    container_name: spaceops-mcp-telemetry
    env_file:
      - ./.env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    command: ["python", "-m", "apps.mcp.telemetry_server.main"]
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data

  kb-mcp:
    build:
      context: .
      dockerfile: ./apps/mcp/Dockerfile
    container_name: spaceops-mcp-kb
    env_file:
      - ./.env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      # .env is often tuned for host (localhost). Inside Compose, Postgres is the service name.
      DATABASE_URL: postgresql://${POSTGRES_USER:-spaceops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-spaceops}
    command: ["python", "-m", "apps.mcp.kb_server.main"]
    ports:
      - "8002:8002"
    volumes:
      - ./data:/app/data
      - ./kb:/app/kb
    depends_on:
      postgres:
        condition: service_healthy

  ticket-mcp:
    build:
      context: .
      dockerfile: ./apps/mcp/Dockerfile
    container_name: spaceops-mcp-ticket
    env_file:
      - ./.env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    command: ["python", "-m", "apps.mcp.ticket_server.main"]
    ports:
      - "8003:8003"
    volumes:
      - ./data:/app/data

  gitops-mcp:
    build:
      context: .
      dockerfile: ./apps/mcp/Dockerfile
    container_name: spaceops-mcp-gitops
    env_file:
      - ./.env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    command: ["python", "-m", "apps.mcp.gitops_server.main"]
    ports:
      - "8004:8004"
    volumes:
      - ./ops-config:/app/ops-config

  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: spaceops-prometheus
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"   # Prometheus UI (http://localhost:9090)
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:12.4.0
    container_name: spaceops-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"   # Grafana UI (http://localhost:3000)
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  ui:
    build:
      context: ./apps/ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${UI_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_APPROVAL_API_KEY: ${APPROVAL_API_KEY}
    container_name: spaceops-ui
    ports:
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_started
    profiles:
      - ui

volumes:
  postgres_data:
